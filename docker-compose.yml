version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=merchant
      - POSTGRES_PASSWORD=merchantpass
      - POSTGRES_DB=merchantdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
  launches:
    build:
      context: ./src/LaunchesService
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=merchantdb;Username=merchant;Password=merchantpass
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Exchange=launches_exchange
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "5100:80"
  consolidated:
    build:
      context: ./src/ConsolidatedService
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=merchantdb;Username=merchant;Password=merchantpass
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Exchange=launches_exchange
    depends_on:
      - postgres
      - rabbitmq
volumes:
  pgdata:
