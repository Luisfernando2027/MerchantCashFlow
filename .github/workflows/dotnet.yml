name: .NET Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Restore
      run: dotnet restore MerchantCashFlow.sln
    - name: Build
      run: dotnet build MerchantCashFlow.sln --no-restore -c Release
    - name: Test
      run: dotnet test MerchantCashFlow.sln --no-build -c Release
